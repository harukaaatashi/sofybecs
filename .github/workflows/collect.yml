name: collect-reviews

on:
  schedule:
    # JST 6:00（UTC+9）に1日1回
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: collect-reviews
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect and notify
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m collector.main

      - name: Persist state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json data/items.json REVIEWS.md
          git diff --cached --quiet || git commit -m "chore: 口コミデータ更新"
          git push

      - name: Build site
        if: vars.ENABLE_PUBLIC_SITE == '1'
        env:
          INTERNAL_SITE_EXPORT: "1"
        run: node scripts/build_site.mjs

      - uses: actions/upload-pages-artifact@v3
        if: vars.ENABLE_PUBLIC_SITE == '1'
        with:
          path: _site

      - name: Deploy to GitHub Pages
        if: vars.ENABLE_PUBLIC_SITE == '1'
        id: deployment
        uses: actions/deploy-pages@v4
