<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<title>Internal Only</title>
<style>
  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --border: #e8e4e0;
    --text: #33302e;
    --sub: #8a8480;
    --accent: #c94f7c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: radial-gradient(circle at top, #fff4f7, var(--bg) 42%);
    color: var(--text);
    font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  }
  .panel {
    width: min(680px, 100%);
    padding: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 18px 48px rgba(75, 48, 57, 0.08);
  }
  h1 { margin: 0 0 12px; font-size: 24px; }
  p { margin: 0 0 12px; line-height: 1.7; }
  code {
    padding: 2px 6px;
    background: #fbeef3;
    border-radius: 6px;
    color: var(--accent);
  }
  .sub { color: var(--sub); }
</style>
</head>
<body>
  <main class="panel">
    <h1>このデプロイでは口コミデータを公開していません</h1>
    <p>内部向け配信として有効化された環境だけが、実データ付きの静的サイトを生成します。</p>
    <p class="sub">Vercel では <code>SITE_PASSWORD</code>（合言葉ゲート）と <code>INTERNAL_SITE_EXPORT=1</code> を設定したプロジェクトだけで実データを配信します。</p>
  </main>
</body>
</html>
